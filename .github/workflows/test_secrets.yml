name: Test Secrets
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
      - name: Check Channel Title
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          python -c '
          import os
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build

          client_id = os.environ.get("YT_CLIENT_ID", "")
          client_secret = os.environ.get("YT_CLIENT_SECRET", "")
          refresh_token = os.environ.get("YT_REFRESH_TOKEN", "")

          if not client_id or not client_secret or not refresh_token:
              with open("channel_title.txt", "w") as f:
                  f.write("Error: Missing environment variables")
              exit(0)

          try:
              creds = Credentials(
                  token=None,
                  refresh_token=refresh_token,
                  token_uri="https://oauth2.googleapis.com/token",
                  client_id=client_id,
                  client_secret=client_secret,
                  scopes=["https://www.googleapis.com/auth/youtube"]
              )
              creds.refresh(Request())
              youtube = build("youtube", "v3", credentials=creds)
              channels_response = youtube.channels().list(
                  part="snippet",
                  mine=True
              ).execute()
              
              if "items" in channels_response:
                  title = channels_response["items"][0]["snippet"]["title"]
              else:
                  title = "No channels found"
              with open("channel_title.txt", "w") as f:
                  f.write(title)
          except Exception as e:
              with open("channel_title.txt", "w") as f:
                  f.write(f"Error: {e}")
          '
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: channel-title-artifact
          path: channel_title.txt
